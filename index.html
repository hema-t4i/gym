<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hema's Workout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #111110;
  --surface: #1a1918;
  --surface2: #222120;
  --border: #302e2b;
  --text: #ece8e1;
  --text2: #8a847a;
  --accent: #7ec89f;
  --accent2: #5ea87f;
  --glow: rgba(126, 200, 159, 0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}

.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

.header {
  text-align: center;
  padding: 24px 0 28px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header p {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}
.duration-picker {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 10px;
}
.dur-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.dur-btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 10px;
  padding-left: 4px;
}

.focus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.focus-grid .focus-btn:last-child {
  grid-column: 1 / -1;
}

.focus-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.focus-btn .emoji { font-size: 22px; display: block; margin-bottom: 8px; }
.focus-btn .sub { font-size: 11px; color: var(--text2); font-weight: 400; margin-top: 3px; display: block; }
.focus-btn.active {
  border-color: var(--accent);
  background: rgba(126, 200, 159, 0.10);
  box-shadow: 0 0 0 2px var(--accent);
}
.focus-btn .selected-dot {
  display: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  top: 10px;
  right: 10px;
  align-items: center;
  justify-content: center;
}
.focus-btn .selected-dot svg { display: block; }
.focus-btn.active .selected-dot { display: flex; }
.focus-btn { position: relative; }
.focus-btn:active { transform: scale(0.97); }

.generate-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: #111110;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 32px;
  transition: all 0.2s;
  letter-spacing: -0.3px;
}
.generate-btn:active { transform: scale(0.97); opacity: 0.9; }
.generate-btn:disabled { opacity: 0.4; }

.workout { display: none; }
.workout.visible { display: block; }

.workout-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}
.workout-header h2 { font-size: 18px; font-weight: 700; }
.workout-header .duration { font-size: 12px; color: var(--text2); }

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.exercise-card.done {
  opacity: 0.4;
  border-color: transparent;
}
.exercise-card .top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.exercise-card .name {
  font-size: 15px;
  font-weight: 600;
}
.exercise-card .check {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.exercise-card.done .check {
  border-color: var(--accent);
  background: var(--accent);
}
.exercise-card .check svg { display: none; }
.exercise-card.done .check svg { display: block; }

.exercise-card .details {
  display: flex;
  gap: 16px;
  margin-top: 10px;
  font-size: 13px;
  color: var(--text2);
}
.exercise-card .details span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.exercise-card .note {
  margin-top: 10px;
  font-size: 12px;
  color: #bfb5a8;
  line-height: 1.5;
  padding: 8px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
}

.exercise-card .demo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.exercise-card .demo-thumb {
  position: relative;
  width: 90px;
  height: 52px;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--surface2);
}
.exercise-card .demo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.exercise-card .demo-thumb .play-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
}
.exercise-card .demo-thumb .play-icon svg {
  display: block;
}
.exercise-card .demo-link {
  font-size: 12px;
  color: var(--text2);
  text-decoration: none;
  font-weight: 500;
}
.exercise-card .demo-link:active {
  color: var(--text);
}

.exercise-card .bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  gap: 10px;
}
.exercise-card .swap-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.exercise-card .swap-btn:active {
  background: var(--border);
  color: var(--text);
}
.exercise-card .swap-btn svg {
  display: block;
}

.superset-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin: 18px 0 8px 4px;
  font-weight: 600;
}

.progress-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: none;
}
.progress-bar.visible { display: block; }
.progress-bar .bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-bar .bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}
.progress-bar .bar-text {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
}
</style>
</head>

    </button>
  </div>

  <button type="button" class="generate-btn" id="genBtn" disabled>Pick a focus to start</button>

  <div class="workout" id="workout"></div>
</div>

<div class="progress-bar" id="progressBar">

let selectedFocuses = new Set();
let totalExercises = 0;
let completedExercises = 0;
let selectedDuration = 45;

document.querySelector('.focus-grid').addEventListener('click', e => {
  const btn = e.target.closest('.focus-btn');
  if (btn) toggleFocus(btn);
});
document.getElementById('genBtn').addEventListener('click', generateWorkout);
document.querySelector('.duration-picker').addEventListener('click', e => {
  const btn = e.target.closest('.dur-btn');
  if (!btn) return;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDuration = parseInt(btn.dataset.dur);
});

function toggleFocus(btn) {
  const focus = btn.dataset.focus;
  if (focus === 'full') {
    selectedFocuses.clear();
    document.querySelectorAll('.focus-btn').forEach(b => b.classList.remove('active'));
    selectedFocuses.add('full');
    btn.classList.add('active');
  } else {
    document.querySelector('[data-focus="full"]').classList.remove('active');
    selectedFocuses.delete('full');
    if (selectedFocuses.has(focus)) {
      selectedFocuses.delete(focus);
      btn.classList.remove('active');
    } else {
      selectedFocuses.add(focus);
      btn.classList.add('active');
    }
  }
  const genBtn = document.querySelector('.generate-btn');
  genBtn.disabled = selectedFocuses.size === 0;
  const names = [...selectedFocuses].map(f => f === 'full' ? 'full body' : f);
  genBtn.textContent = selectedFocuses.size === 0 ? 'Pick a focus to start' : `Generate ${names.join(' + ')} workout`;
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getDurationConfig() {
  if (selectedDuration === 30) return { mains: 3, comboMains: 4, warmups: 2, cooldowns: 2, supersets: 1 };
  if (selectedDuration === 60) return { mains: 6, comboMains: 8, warmups: 3, cooldowns: 3, supersets: 3 };
  return { mains: 4, comboMains: 6, warmups: 3, cooldowns: 3, supersets: 2 };
}

function scaleWorkout(workout) {
  const cfg = getDurationConfig();
  const warmups = workout.exercises.filter(e => e.type === 'warmup');
  const mains = workout.exercises.filter(e => !e.type || e.type === 'finisher');
  const scaled = shuffle(mains).slice(0, cfg.mains + 1);
  for (let i = 0; i < scaled.length - 1; i += 2) {
    if (i / 2 < cfg.supersets) {
      const tag = String.fromCharCode(65 + i / 2);
      scaled[i].superset = tag;
      scaled[i].rest = '\u2014';
      scaled[i + 1].superset = tag;
    }
  }
  return { name: workout.name, exercises: [...warmups.slice(0, cfg.warmups), ...scaled] };
}

function generateWorkout() {
  const focuses = [...selectedFocuses];
  if (focuses.length === 1) {
    const w = pickRandom(WORKOUTS[focuses[0]]);
    renderWorkout(selectedDuration === 45 ? w : scaleWorkout(w));
    return;
  }
  const merged = buildComboWorkout(focuses);
  renderWorkout(merged);
}

function buildComboWorkout(focuses) {
  const label = focuses.map(f => f.charAt(0).toUpperCase() + f.slice(1)).join(' + ');
  const exercises = [];
  const warmups = [];
  const mains = [];
  const finishers = [];

  focuses.forEach(f => {
    const w = pickRandom(WORKOUTS[f]);
    w.exercises.forEach(ex => {
      if (ex.type === 'warmup') warmups.push(ex);
      else if (ex.type === 'finisher') finishers.push(ex);
      else mains.push({ ...ex, superset: undefined });
    });
  });

  const cfg = getDurationConfig();
  const pickedWarmups = shuffle(warmups).slice(0, 2);
  const pickedMains = shuffle(mains).slice(0, cfg.comboMains);
  const pickedFinisher = shuffle(finishers).slice(0, 1);

  for (let i = 0; i < pickedMains.length - 1; i += 2) {
    const tag = String.fromCharCode(65 + i / 2);
    pickedMains[i].superset = tag;
    pickedMains[i].rest = '\u2014';
    pickedMains[i + 1].superset = tag;
    pickedMains[i + 1].rest = pickedMains[i + 1].rest || '60s';
  }

  return {
    name: label + ' Combo',
    exercises: [...pickedWarmups, ...pickedMains, ...pickedFinisher]
  };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getStretches(focuses, phase) {
  const pool = [];
  const seen = new Set();
  focuses.forEach(f => {
    const key = f === 'full' ? 'glutes' : f;
    (STRETCHES[phase][key] || []).forEach(s => {
      if (!seen.has(s.name)) { seen.add(s.name); pool.push(s); }
    });
  });
  if (focuses.includes('full')) {
    ['core', 'upper'].forEach(k => {
      (STRETCHES[phase][k] || []).forEach(s => {
        if (!seen.has(s.name)) { seen.add(s.name); pool.push(s); }
      });
    });
  }
  const cfg = getDurationConfig();
  return pool.slice(0, phase === 'warmup' ? cfg.warmups : cfg.cooldowns);
}

function renderWorkout(workout) {
  const focuses = [...selectedFocuses];
  const warmupStretches = getStretches(focuses, 'warmup');
  const cooldownStretches = getStretches(focuses, 'cooldown');

  const allExercises = [...warmupStretches, ...workout.exercises, ...cooldownStretches];

  currentExercises = [...allExercises];
  swapPool = buildSwapPool();

  doneIndices = new Set();

  const container = document.getElementById('workout');
  container.innerHTML = `<div class="workout-header"><h2>${workout.name}</h2><div class="duration">~${selectedDuration} min</div></div>`;
  container.classList.add('visible');
  document.getElementById('progressBar').classList.add('visible');

  rerenderExercises();
  container.scrollIntoView({ behavior: 'smooth' });
}

let currentExercises = [];
let swapPool = [];
let doneIndices = new Set();

function buildSwapPool() {
  const focuses = [...selectedFocuses];
  const pool = [];
  const expand = f => f === 'full' ? ['glutes', 'core', 'upper'] : [f];
  const allFocuses = focuses.flatMap(expand);
  allFocuses.forEach(f => {
    (WORKOUTS[f] || []).forEach(w => {
      w.exercises.forEach(ex => {
        if (ex.type !== 'warmup' && ex.type !== 'finisher') pool.push(ex);
      });
    });
  });
  return pool;
}

function swapExercise(idx) {
  const current = currentExercises[idx];
  if (!current) return;
  const currentNames = new Set(currentExercises.map(e => e.name));
  const candidates = swapPool.filter(e => !currentNames.has(e.name) && e.type !== 'warmup' && e.type !== 'finisher');
  if (candidates.length === 0) return;
  const replacement = candidates[Math.floor(Math.random() * candidates.length)];
  currentExercises[idx] = { ...replacement, superset: current.superset, rest: current.rest || replacement.rest };
  doneIndices.delete(idx);
  rerenderExercises();
}

function isNonCountable(ex) {
  return ex.type === 'warmup' || ex.type === 'stretch';
}

function rerenderExercises() {
  const container = document.getElementById('workout');
  const header = container.querySelector('.workout-header');
  const headerHtml = header ? header.outerHTML : '';
  totalExercises = currentExercises.filter(e => !isNonCountable(e)).length;
  completedExercises = [...doneIndices].filter(i => currentExercises[i] && !isNonCountable(currentExercises[i])).length;
  let html = headerHtml;
  let currentSuperset = null;
  currentExercises.forEach((ex, i) => {
    const prev = currentExercises[i-1];
    if (ex.type === 'stretch' && (!prev || prev.type !== 'stretch')) html += '<div class="superset-label">Dynamic Warm-Up</div>';
    if (ex.type === 'warmup' && (!prev || prev.type !== 'warmup')) html += '<div class="superset-label">Activation</div>';
    if (ex.type === 'cooldown' && (!prev || prev.type !== 'cooldown')) { html += '<div class="superset-label">Cool-Down Stretch</div>'; currentSuperset = null; }
    if (ex.type === 'finisher' && prev && prev.type !== 'finisher') { html += '<div class="superset-label">Finisher</div>'; currentSuperset = null; }
    if (ex.superset && ex.superset !== currentSuperset) { currentSuperset = ex.superset; html += `<div class="superset-label">Superset ${ex.superset}</div>`; }
    else if (!ex.superset && !ex.type) currentSuperset = null;
    const vid = VIDEOS[ex.name];
    const videoUrl = vid ? `https://www.youtube.com/watch?v=${vid}` : `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name + ' exercise form')}`;
    const thumbUrl = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : '';
    const isDone = doneIndices.has(i);
    html += `
      <div class="exercise-card${isDone ? ' done' : ''}" onclick="toggleDone(${i})">
        <div class="top-row">
          <div class="name">${ex.name}</div>
          <div class="check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#111110" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        <div class="details">
          <span>${ex.sets} sets</span>
          <span>${ex.reps} reps</span>
          ${ex.rest ? `<span>${ex.rest} rest</span>` : ''}
        </div>
        ${ex.note ? `<div class="note">${ex.note}</div>` : ''}
        <div class="bottom-row">
          ${thumbUrl ? `<a class="demo-row" href="${videoUrl}" target="_blank" onclick="event.stopPropagation()" style="margin-top:0">
            <div class="demo-thumb">
              <img src="${thumbUrl}" alt="${ex.name}" loading="lazy">
              <div class="play-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="8 5 19 12 8 19"/></svg></div>
            </div>
            <span class="demo-link">Watch demo</span>
          </a>` : '<span></span>'}
          ${!isNonCountable(ex) ? `<button type="button" class="swap-btn" onclick="event.stopPropagation(); swapExercise(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Swap
          </button>` : ''}
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
  updateProgress();
}

function toggleDone(idx) {
  if (doneIndices.has(idx)) doneIndices.delete(idx);
  else doneIndices.add(idx);
  rerenderExercises();
}

function updateProgress() {
  const pct = totalExercises > 0 ? (completedExercises / totalExercises) * 100 : 0;
  document.getElementById('barFill').style.width = pct + '%';
  const text = completedExercises === totalExercises && totalExercises > 0
    ? 'Workout complete \uD83C\uDF89'
    : `${completedExercises} / ${totalExercises} done`;
  document.getElementById('barText').textContent = text;
}
</script>
</body>
</html>
