<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hema's Gym</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #c4a0ff;
  --accent2: #9b6fdf;
  --glow: rgba(196, 160, 255, 0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}

.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

.header {
  text-align: center;
  padding: 24px 0 28px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header p {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 10px;
  padding-left: 4px;
}

.focus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.focus-grid .focus-btn:last-child {
  grid-column: 1 / -1;
}

.focus-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.focus-btn .emoji { font-size: 22px; display: block; margin-bottom: 8px; }
.focus-btn .sub { font-size: 11px; color: var(--text2); font-weight: 400; margin-top: 3px; display: block; }
.focus-btn.active {
  border-color: var(--accent);
  background: rgba(196, 160, 255, 0.18);
  box-shadow: 0 0 0 2px var(--accent);
}
.focus-btn .selected-dot {
  display: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  top: 10px;
  right: 10px;
  align-items: center;
  justify-content: center;
}
.focus-btn .selected-dot svg { display: block; }
.focus-btn.active .selected-dot { display: flex; }
.focus-btn { position: relative; }
.focus-btn:active { transform: scale(0.97); }

.generate-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #0a0a0a;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 32px;
  transition: all 0.2s;
  letter-spacing: -0.3px;
}
.generate-btn:active { transform: scale(0.97); opacity: 0.9; }
.generate-btn:disabled { opacity: 0.4; }

.workout { display: none; }
.workout.visible { display: block; }

.workout-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}
.workout-header h2 { font-size: 18px; font-weight: 700; }
.workout-header .duration { font-size: 12px; color: var(--text2); }

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.exercise-card.done {
  opacity: 0.4;
  border-color: transparent;
}
.exercise-card .top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.exercise-card .name {
  font-size: 15px;
  font-weight: 600;
}
.exercise-card .check {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.exercise-card.done .check {
  border-color: var(--accent);
  background: var(--accent);
}
.exercise-card .check svg { display: none; }
.exercise-card.done .check svg { display: block; }

.exercise-card .details {
  display: flex;
  gap: 16px;
  margin-top: 10px;
  font-size: 13px;
  color: var(--text2);
}
.exercise-card .details span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.exercise-card .note {
  margin-top: 10px;
  font-size: 12px;
  color: var(--accent);
  line-height: 1.5;
  padding: 8px 10px;
  background: var(--glow);
  border-radius: 8px;
}

.superset-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin: 18px 0 8px 4px;
  font-weight: 600;
}

.progress-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: none;
}
.progress-bar.visible { display: block; }
.progress-bar .bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-bar .bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}
.progress-bar .bar-text {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
}
</style>
</head>

</div>

</div>

let selectedFocuses = new Set();
let totalExercises = 0;
let completedExercises = 0;

document.querySelector('.focus-grid').addEventListener('click', e => {
  const btn = e.target.closest('.focus-btn');
  if (btn) toggleFocus(btn);
});
document.getElementById('genBtn').addEventListener('click', generateWorkout);

function toggleFocus(btn) {
  const focus = btn.dataset.focus;
  if (focus === 'full') {
    selectedFocuses.clear();
    document.querySelectorAll('.focus-btn').forEach(b => b.classList.remove('active'));
    selectedFocuses.add('full');
    btn.classList.add('active');
  } else {
    document.querySelector('[data-focus="full"]').classList.remove('active');
    selectedFocuses.delete('full');
    if (selectedFocuses.has(focus)) {
      selectedFocuses.delete(focus);
      btn.classList.remove('active');
    } else {
      selectedFocuses.add(focus);
      btn.classList.add('active');
    }
  }
  const genBtn = document.querySelector('.generate-btn');
  genBtn.disabled = selectedFocuses.size === 0;
  const names = [...selectedFocuses].map(f => f === 'full' ? 'full body' : f);
  genBtn.textContent = selectedFocuses.size === 0 ? 'pick a focus to start' : `generate ${names.join(' + ')} workout`;
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateWorkout() {
  const focuses = [...selectedFocuses];
  if (focuses.length === 1) {
    renderWorkout(pickRandom(WORKOUTS[focuses[0]]));
    return;
  }
  const merged = buildComboWorkout(focuses);
  renderWorkout(merged);
}

function buildComboWorkout(focuses) {
  const label = focuses.map(f => f.charAt(0).toUpperCase() + f.slice(1)).join(' + ');
  const exercises = [];
  const warmups = [];
  const mains = [];
  const finishers = [];

  focuses.forEach(f => {
    const w = pickRandom(WORKOUTS[f]);
    w.exercises.forEach(ex => {
      if (ex.type === 'warmup') warmups.push(ex);
      else if (ex.type === 'finisher') finishers.push(ex);
      else mains.push({ ...ex, superset: undefined });
    });
  });

  const pickedWarmups = shuffle(warmups).slice(0, 2);
  const pickedMains = shuffle(mains).slice(0, 6);
  const pickedFinisher = shuffle(finishers).slice(0, 1);

  for (let i = 0; i < pickedMains.length - 1; i += 2) {
    const tag = String.fromCharCode(65 + i / 2);
    pickedMains[i].superset = tag;
    pickedMains[i].rest = '\u2014';
    pickedMains[i + 1].superset = tag;
    pickedMains[i + 1].rest = pickedMains[i + 1].rest || '60s';
  }

  return {
    name: label + ' Combo',
    exercises: [...pickedWarmups, ...pickedMains, ...pickedFinisher]
  };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderWorkout(workout) {
  const container = document.getElementById('workout');
  let html = `<div class="workout-header"><h2>${workout.name}</h2><div class="duration">~45 min</div></div>`;

  let currentSuperset = null;
  completedExercises = 0;
  totalExercises = workout.exercises.filter(e => e.type !== 'warmup').length;

  workout.exercises.forEach((ex, i) => {
    if (ex.type === 'warmup' && (i === 0 || workout.exercises[i-1].type !== 'warmup')) {
      html += `<div class="superset-label">Warm-Up</div>`;
    }
    if (ex.type === 'finisher' && workout.exercises[i-1].type !== 'finisher') {
      html += `<div class="superset-label">Finisher</div>`;
      currentSuperset = null;
    }
    if (ex.superset && ex.superset !== currentSuperset) {
      currentSuperset = ex.superset;
      html += `<div class="superset-label">Superset ${ex.superset}</div>`;
    } else if (!ex.superset && !ex.type) {
      currentSuperset = null;
    }

    html += `
      <div class="exercise-card" onclick="toggleDone(this, ${ex.type === 'warmup'})">
        <div class="top-row">
          <div class="name">${ex.name}</div>
          <div class="check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        <div class="details">
          <span>${ex.sets} sets</span>
          <span>${ex.reps} reps</span>
          ${ex.rest ? `<span>${ex.rest} rest</span>` : ''}
        </div>
        ${ex.note ? `<div class="note">${ex.note}</div>` : ''}
      </div>
    `;
  });

  container.innerHTML = html;
  container.classList.add('visible');

  const bar = document.getElementById('progressBar');
  bar.classList.add('visible');
  updateProgress();

  container.scrollIntoView({ behavior: 'smooth' });
}

function toggleDone(card, isWarmup) {
  card.classList.toggle('done');
  if (!isWarmup) {
    if (card.classList.contains('done')) completedExercises++;
    else completedExercises--;
    updateProgress();
  }
}

function updateProgress() {
  const pct = totalExercises > 0 ? (completedExercises / totalExercises) * 100 : 0;
  document.getElementById('barFill').style.width = pct + '%';
  const text = completedExercises === totalExercises && totalExercises > 0
    ? 'workout complete \uD83C\uDF89'
    : `${completedExercises} / ${totalExercises} done`;
  document.getElementById('barText').textContent = text;
}
</script>
